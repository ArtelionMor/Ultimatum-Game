<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Market Ultimatum</title>
  <link rel="stylesheet" href="style.css" />
  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Ultimatum" />
  <link rel="apple-touch-icon" href="icon-192.png" />
</head>
<body>
  <!-- Main menu -->
  <div id="menu-screen" class="hidden">
    <header id="menu-head">
      <button id="profile-btn"><img alt=""></button>
      <div id="menu-currencies"></div>
    </header>
    <div id="menu-body"></div>
    <nav id="menu-tabs">
      <button data-tab="characters"><span class="tab-ico">🧑‍🤝‍🧑</span><span class="tab-lbl">Personnages</span></button>
      <button data-tab="levels" class="active"><span class="tab-ico">🗺️</span><span class="tab-lbl">Niveaux</span></button>
      <button data-tab="chests"><span class="tab-ico">🎁</span><span class="tab-lbl">Coffres</span></button>
    </nav>
  </div>

  <div id="app">
    <header id="hud">
      <div class="hud-item" id="hud-money"><img class="hud-icon" src="sprites/UI/Coins.png" alt="$" /><span id="money">0</span></div>
      <div class="hud-item clickable" id="hud-rank" title="Classement"><span id="rank-chip">🏆 —</span></div>
      <div class="hud-item" id="hud-timer"><span id="timer">0</span></div>
      <div class="hud-item clickable" id="hud-home" title="Retour au menu">🏠</div>
    </header>

    <!-- Next-wave demand menu -->
    <div id="wave-preview"></div>

    <!-- Écran UNIQUE, sans scroll vertical : marché toujours visible en haut,
         machines en carrousel horizontal aimanté, banc + boutons en bas.
         L'inventaire et les achats vivent dans des sheets (voir plus bas). -->
    <main id="content">
      <!-- MARKET (top, pleine taille en permanence) -->
      <section id="market-zone" class="zone">
        <div id="speed-sel" title="Vitesse du jeu">
          <button data-speed="1"><span class="sp-ico">▶</span><span class="sp-lbl">x1</span></button>
          <button data-speed="2"><span class="sp-ico">▶▶</span><span class="sp-lbl">x2</span></button>
          <button data-speed="4"><span class="sp-ico">▶▶▶</span><span class="sp-lbl">x4</span></button>
        </div>
        <div id="customer-lane"></div>
        <div id="suppliers"></div>
      </section>

      <!-- FACTORY : pastilles d'état (une par machine, tap = y aller) + carrousel -->
      <section id="factory-zone" class="zone">
        <div id="machine-dots"></div>
        <div id="machine-list"></div>
      </section>
    </main>

    <footer id="bottom-bar">
      <div id="worker-bar">
        <div id="worker-hint"></div>
        <div id="worker-icons"></div>
      </div>
      <div id="bottom-actions">
        <button id="boutique-btn" title="Achats : ouvriers, marketing, stockage">🛒<span class="ba-lbl">Boutique</span></button>
        <button id="stock-btn" title="Ton inventaire">📦<span class="ba-lbl" id="stock-btn-count">0/0</span></button>
      </div>
    </footer>
  </div>

  <!-- Boutique sheet : les achats tycoon (ouvrier / marketing / stockage).
       #shop-bar garde son id : les cibles du tutoriel pointent dessus. -->
  <div id="boutique-overlay" class="overlay hidden">
    <div id="boutique-sheet" class="sheet">
      <div class="sheet-grip"></div>
      <div class="sheet-head"><h2>🛒 Boutique</h2></div>
      <div id="shop-bar"></div>
    </div>
  </div>

  <!-- Stock sheet : l'inventaire (avec son bouton Merge). Même règle d'id. -->
  <div id="stock-overlay" class="overlay hidden">
    <div id="stock-sheet" class="sheet">
      <div class="sheet-grip"></div>
      <div id="inventory-bar"></div>
    </div>
  </div>

  <!-- Standings info screen (tap the HUD rank chip) -->
  <div id="rankinfo-overlay" class="overlay hidden">
    <div class="panel wide">
      <h2>🏆 Classement</h2>
      <div id="rankinfo-body"></div>
      <button id="rankinfo-close" class="ghost">Fermer</button>
    </div>
  </div>

  <!-- Results overlay -->
  <div id="results-overlay" class="overlay hidden">
    <div class="panel wide">
      <h2 id="results-title">Classement</h2>
      <div id="results-market"></div>
      <div id="results-list"></div>
      <button id="results-continue">Round suivant</button>
    </div>
  </div>

  <!-- Merge sheet (slides in from the bottom edge; lists only doable merges) -->
  <div id="merge-overlay" class="overlay hidden">
    <div id="merge-sheet">
      <div class="sheet-grip"></div>
      <div class="sheet-head">
        <h2>Merge</h2>
        <label class="automerge"><input type="checkbox" id="automerge-box"> Auto-merge</label>
      </div>
      <div id="merge-list"></div>
    </div>
  </div>

  <!-- Competitor info overlay -->
  <div id="competitor-overlay" class="overlay hidden">
    <div class="panel wide">
      <div id="competitor-body"></div>
      <button id="competitor-close">Fermer</button>
    </div>
  </div>

  <!-- Resource info overlay -->
  <div id="resource-overlay" class="overlay hidden">
    <div class="panel wide">
      <div id="resource-body"></div>
      <button id="resource-close">Fermer</button>
    </div>
  </div>

  <!-- Cheat console -->
  <button id="cheat-toggle" title="Console de triche">🛠️</button>
  <div id="cheat-overlay" class="overlay hidden">
    <div class="panel wide">
      <h2>🛠️ Console de triche</h2>
      <div class="cheat-section">
        <div class="cheat-label">Vitesse du temps <span id="cheat-speed-val">×1</span></div>
        <div class="cheat-row" id="cheat-speeds">
          <button data-speed="1">Normal ×1</button>
          <button data-speed="2">×2</button>
          <button data-speed="4">×4</button>
          <button data-speed="8">×8</button>
        </div>
      </div>
      <div class="cheat-section">
        <div class="cheat-label">Argent</div>
        <div class="cheat-row">
          <input id="cheat-money" type="number" value="1000" />
          <button id="cheat-money-add">Ajouter</button>
        </div>
      </div>
      <div class="cheat-section">
        <div class="cheat-label">Aller à la vague</div>
        <div class="cheat-row">
          <input id="cheat-wave" type="number" min="1" value="1" />
          <button id="cheat-wave-go">Go to</button>
        </div>
      </div>
      <div class="cheat-section">
        <div class="cheat-label">Partie en cours</div>
        <div class="cheat-row">
          <button id="cheat-win">🏆 Gagner</button>
          <button id="cheat-lose">💀 Perdre</button>
        </div>
      </div>
      <div class="cheat-section">
        <div class="cheat-label">Méta — monnaies</div>
        <div class="cheat-row">
          <input id="cheat-meta-amount" type="number" value="100" />
          <button data-cur="coins">🪙 Pièces</button>
          <button data-cur="gems">💎 Gemmes</button>
        </div>
        <div class="cheat-row" id="cheat-shards">
          <button data-shard="common_shard">🔷C</button>
          <button data-shard="rare_shard">🔷R</button>
          <button data-shard="epic_shard">🔷E</button>
          <button data-shard="legendary_shard">🔷L</button>
        </div>
      </div>
      <div class="cheat-section">
        <div class="cheat-label">Méta — coffres (+1)</div>
        <div class="cheat-row" id="cheat-chests">
          <button data-chest="common_chest">🎁C</button>
          <button data-chest="rare_chest">🎁R</button>
          <button data-chest="epic_chest">🎁E</button>
          <button data-chest="legendary_chest">🎁L</button>
        </div>
      </div>
      <div class="cheat-section">
        <div class="cheat-label">Méta — progression</div>
        <div class="cheat-row">
          <button id="cheat-unlock-chars">🧑 Tous les persos</button>
          <button id="cheat-levelup-chars">⬆ +1 Nv persos</button>
        </div>
        <div class="cheat-row">
          <button id="cheat-complete-level">✅ Finir niveau suivant</button>
          <button id="cheat-unlock-levels">🗺️ Tout débloquer</button>
        </div>
        <div class="cheat-row">
          <button id="cheat-reset" class="ghost">♻️ Reset sauvegarde</button>
        </div>
      </div>
      <button id="cheat-close" class="ghost">Fermer</button>
    </div>
  </div>

  <!-- Game over overlay -->
  <div id="gameover-overlay" class="overlay hidden">
    <div class="panel">
      <h2 id="gameover-title">Partie terminée</h2>
      <img class="big-icon" src="sprites/UI/Coins.png" alt="" />
      <div class="final-score"><span id="final-score">0</span></div>
      <p id="gameover-rank"></p>
      <div id="gameover-rewards"></div>
      <button id="replay-btn">Rejouer</button>
      <button id="gameover-menu-btn" class="ghost">Menu principal</button>
    </div>
  </div>

  <!-- Slot attribution overlay (characters tab: race -> character) -->
  <div id="slot-overlay" class="overlay hidden">
    <div class="panel wide">
      <div id="slot-body"></div>
      <button id="slot-close" class="ghost">Fermer</button>
    </div>
  </div>

  <!-- Profile picture overlay: pick an unlocked character sprite as avatar -->
  <div id="profile-overlay" class="overlay hidden">
    <div class="panel wide">
      <div id="profile-body"></div>
      <button id="profile-close" class="ghost">Fermer</button>
    </div>
  </div>

  <!-- Character detail overlay (menu collection + in-game worker tap) -->
  <div id="character-overlay" class="overlay hidden">
    <div class="panel wide">
      <div id="character-body"></div>
      <button id="character-close" class="ghost">Fermer</button>
    </div>
  </div>

  <!-- Building detail overlay (tap a building in affinities / recipe graph) -->
  <div id="building-overlay" class="overlay hidden">
    <div class="panel wide">
      <div id="building-body"></div>
      <button id="building-close" class="ghost">Fermer</button>
    </div>
  </div>

  <!-- Codex overlay: customers & resources browser -->
  <div id="codex-overlay" class="overlay hidden">
    <div class="panel wide">
      <nav id="codex-tabs">
        <button data-tab="customers">🐾 Clients</button>
        <button data-tab="resources">📦 Ressources</button>
      </nav>
      <div id="codex-body"></div>
      <button id="codex-close" class="ghost">Fermer</button>
    </div>
  </div>

  <!-- Chest opening overlay -->
  <div id="chest-overlay" class="overlay hidden">
    <div class="panel">
      <h2 id="chest-title">Coffre</h2>
      <div id="chest-anim"></div>
      <div id="chest-drops"></div>
      <button id="chest-close" class="hidden">Récupérer</button>
      <div id="chest-again" class="hidden">
        <button id="chest-one-more" class="ghost">Ouvrir un autre</button>
        <button id="chest-open-all" class="ghost">Ouvrir tous</button>
      </div>
    </div>
  </div>

  <!-- Quit-level confirm overlay -->
  <div id="quit-overlay" class="overlay hidden">
    <div class="panel">
      <h2>Abandonner ?</h2>
      <p>La progression de ce niveau sera perdue.</p>
      <button id="quit-confirm">Retour au menu</button>
      <button id="quit-cancel" class="ghost">Continuer la partie</button>
    </div>
  </div>

  <script type="module" src="main.js"></script>
  <script>
    // Enregistre le service worker (nécessaire pour l'installation PWA + hors-ligne).
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
