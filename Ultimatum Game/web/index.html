<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Market Ultimatum</title>
  <link rel="stylesheet" href="style.css" />
  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Ultimatum" />
  <link rel="apple-touch-icon" href="icon-192.png" />
</head>
<body>
  <div id="app">
    <header id="hud">
      <div class="hud-item" id="hud-money"><img class="hud-icon" src="sprites/Coins.png" alt="$" /><span id="money">0</span></div>
      <div class="hud-item" id="hud-round">R <span id="round">0</span>/<span id="total-rounds">0</span></div>
      <div class="hud-item clickable" id="hud-tax" title="Impôts & vagues"><span id="tax-chip">🏛️ —</span></div>
      <div class="hud-item" id="hud-phase"><span id="phase-label">—</span></div>
      <div class="hud-item" id="hud-timer"><span id="timer">0</span></div>
    </header>

    <!-- Next-wave demand menu -->
    <div id="wave-preview"></div>

    <div id="phase-banner"></div>

    <main id="content">
      <!-- MARKET (top) -->
      <section id="market-zone" class="zone">
        <div id="customer-lane"></div>
        <div id="suppliers"></div>
      </section>

      <!-- FACTORY (bottom) -->
      <section id="factory-zone" class="zone">
        <div id="inventory-bar"></div>
        <div id="shop-bar"></div>
        <div id="machine-list"></div>
      </section>
    </main>

    <footer id="worker-bar">
      <div id="worker-hint">Touche un ouvrier puis une machine</div>
      <div id="worker-icons"></div>
    </footer>
  </div>

  <!-- Tax & waves info screen -->
  <div id="taxinfo-overlay" class="overlay hidden">
    <div class="panel wide">
      <h2>🏛️ Impôts &amp; Vagues</h2>
      <div id="taxinfo-body"></div>
      <button id="taxinfo-close" class="ghost">Fermer</button>
    </div>
  </div>

  <!-- Tax overlay -->
  <div id="tax-overlay" class="overlay hidden">
    <div class="panel">
      <h2 id="tax-title">Impôts</h2>
      <div class="tax-row"><span>Avant</span><span id="tax-before">0</span></div>
      <div class="tax-row tax-amount"><span>Impôt</span><span id="tax-amount">0</span></div>
      <div class="tax-row tax-after"><span>Après</span><span id="tax-after">0</span></div>
    </div>
  </div>

  <!-- Results overlay -->
  <div id="results-overlay" class="overlay hidden">
    <div class="panel wide">
      <h2 id="results-title">Classement</h2>
      <div id="results-list"></div>
      <button id="results-continue">Round suivant</button>
    </div>
  </div>

  <!-- Refining (convert) overlay -->
  <div id="convert-overlay" class="overlay hidden">
    <div class="panel wide">
      <h2 id="convert-title">Raffinage</h2>
      <div id="convert-list"></div>
      <button id="convert-close">Fermer</button>
    </div>
  </div>

  <!-- Competitor info overlay -->
  <div id="competitor-overlay" class="overlay hidden">
    <div class="panel wide">
      <div id="competitor-body"></div>
      <button id="competitor-close">Fermer</button>
    </div>
  </div>

  <!-- Resource info overlay -->
  <div id="resource-overlay" class="overlay hidden">
    <div class="panel wide">
      <div id="resource-body"></div>
      <button id="resource-close">Fermer</button>
    </div>
  </div>

  <!-- Game over overlay -->
  <div id="gameover-overlay" class="overlay hidden">
    <div class="panel">
      <h2 id="gameover-title">Partie terminée</h2>
      <img class="big-icon" src="sprites/Coins.png" alt="" />
      <div class="final-score"><span id="final-score">0</span></div>
      <p id="gameover-rank"></p>
      <button id="replay-btn">Rejouer</button>
    </div>
  </div>

  <script type="module" src="main.js"></script>
  <script>
    // Enregistre le service worker (nécessaire pour l'installation PWA + hors-ligne).
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
